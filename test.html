<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luckysheet 测试</ Luckysheet Integration Test</title>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="https://cdn.jsdelivr.net/npm/luckysheet@2.1.13/dist/plugins/js/plugin.js"></script>
  <script>
    // 初始化 Luckysheet
    window.onload = function() {
      const data = [{
        name: '测试工作表',
        color: '#f97316',
        status: 1,
        order: 0,
        celldata: [
          { r: 0, c: 0, v: { v: '项目', m: '项目', bg: '#f8fafc', fc: '#1e293b', bl: 1 } },
          { r: 0, c: 1, v: { v: '金额', m: '金额', bg: '#f8fafc', fc: '#1e293b', bl: 1 } },
          { r: 0, c: 2, v: { v: '说明', m: '说明', bg: '#f8fafc', fc: '#1e293b', bl: 1 } },
          { r: 1, c: 0, v: { v: 'GloBE 收入', m: 'GloBE 收入', fc: '#0369a1' } },
          { r: 1, c: 1, v: { v: '125,000,000', m: '125,000,000', fc: '#0369a1' } },
          { r: 1, c: 2, v: { v: 'GloBE 扣除', m: 'GloBE 扣除', fc: '#dc267f' } },
          { r: 2, c: 0, v: { v: 'GloBE 所得', m: 'GloBE 所得', fc: '#16a34a', bl: 1 } },
          { r: 2, c: 1, v: { v: '13,900,000', m: '13,900,000', fc: '#16a34a', bl: 1 } },
        ],
        config: {
          columnlen: { 0: 150, 1: 200, 2: 200 },
          rowlen: { 0: 30, 1: 25, 2: 25 }
        },
        defaultColWidth: 100,
        defaultRowHeight: 28
      }];

      // 初始化
      luckysheet.create({
        container: 'luckysheet-container',
        data: data,
        showtoolbar: true,
        showsheetbarConfig: {
          add: false
        },
        showsheetbar: false,
        showinfobar: false,
        enableAddRow: true,
        enableAddBackTop: true,
        userInfo: false,
        rowHeaderWidth: 46,
        columnHeaderHeight: 25,
        defaultColWidth: 100,
        defaultRowHeight: 28,
        hook: {
          cellUpdated: function(r, c, oldValue, newValue, isRefresh) {
            console.log('Cell updated:', r, c, oldValue, newValue);
            if (isRefresh) {
              console.log('Refreshing data...');
            }
          }
        }
      });
    };
  </script>
</body>
</html>
